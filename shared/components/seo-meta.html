<!-- SEO Meta Template - Replace placeholders for each subdomain -->
<!-- Replace: {PAGE_TITLE}, {PAGE_DESCRIPTION}, {PAGE_KEYWORDS}, {PAGE_URL}, {PAGE_IMAGE}, {CANONICAL_URL} -->

<!-- Primary Meta Tags -->
<title>{PAGE_TITLE}</title>
<meta name="title" content="{PAGE_TITLE}">
<meta name="description" content="{PAGE_DESCRIPTION}">
<meta name="keywords" content="{PAGE_KEYWORDS}">
<meta name="author" content="Agung Laksono - CEO & Founder PT Montana Wana Teknologi">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
<meta name="googlebot" content="index, follow">
<meta name="language" content="Indonesian, English">
<meta name="revisit-after" content="7 days">
<meta name="geo.region" content="ID-KS">
<meta name="geo.placename" content="Banjarbaru, Kalimantan Selatan">
<meta name="organization" content="PT Montana Wana Teknologi">
<meta name="creator" content="Agung Laksono">

<!-- Canonical URL -->
<link rel="canonical" href="{CANONICAL_URL}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="{PAGE_URL}">
<meta property="og:title" content="{PAGE_TITLE}">
<meta property="og:description" content="{PAGE_DESCRIPTION}">
<meta property="og:image" content="{PAGE_IMAGE}">
<meta property="og:locale" content="id_ID">
<meta property="og:locale:alternate" content="en_US">
<meta property="og:site_name" content="PT Montana Wana Teknologi">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@montanawana">
<meta name="twitter:creator" content="@agunglaksono">
<meta name="twitter:title" content="{PAGE_TITLE}">
<meta name="twitter:description" content="{PAGE_DESCRIPTION}">
<meta name="twitter:image" content="{PAGE_IMAGE}">

<!-- Additional SEO Tags -->
<meta name="theme-color" content="#2E7D32">
<meta name="msapplication-TileColor" content="#2E7D32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<link rel="manifest" href="/assets/site.webmanifest">

<!-- Preconnect to external domains for performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
